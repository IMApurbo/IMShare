<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IMShare — Neural Transfer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#04060d;--bg1:#080c18;--bg2:#0c1220;--bg3:#111828;
  --border:rgba(0,220,255,0.12);--border2:rgba(0,220,255,0.22);
  --cyan:#00dcff;--cyan2:#00a8c8;--violet:#7b5cf5;
  --green:#00ffb3;--red:#ff4560;--amber:#ffb830;
  --text:#c8d8e8;--text2:#6b8099;--text3:#3a5068;
  --glow:0 0 24px rgba(0,220,255,0.35);
  --font:'Syne',sans-serif;--mono:'JetBrains Mono',monospace;
  --r:12px;--r2:20px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;flex-direction:column;position:relative;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,220,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,220,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;top:-40%;left:-20%;width:80vw;height:80vh;background:radial-gradient(ellipse,rgba(0,120,200,0.07) 0%,transparent 70%);pointer-events:none;z-index:0;}

header{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:13px 28px;border-bottom:1px solid var(--border);background:rgba(4,6,13,0.92);backdrop-filter:blur(20px);flex-shrink:0;}
.logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:800;letter-spacing:0.05em;}
.logo-icon{width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(0,220,255,0.15),rgba(123,92,245,0.2));border:1.5px solid rgba(0,220,255,0.5);border-radius:9px;box-shadow:0 0 18px rgba(0,220,255,0.25),inset 0 0 10px rgba(0,220,255,0.08);}
.logo-icon svg{color:var(--cyan);}
.logo-text{background:linear-gradient(100deg,var(--cyan) 0%,#a78bfa 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);animation:pulse-dot 2s ease-in-out infinite;flex-shrink:0;}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.6)}}
.header-right{display:flex;align-items:center;gap:12px;}
.my-id-wrap{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;}
.my-id-label{font-size:10px;font-weight:600;letter-spacing:0.12em;color:var(--text2);text-transform:uppercase;}
#my-peer-id{font-family:var(--mono);font-size:12px;color:var(--cyan);letter-spacing:0.06em;}
.copy-btn{background:none;border:none;cursor:pointer;color:var(--text3);transition:color 0.2s;padding:0;display:flex;align-items:center;}
.copy-btn:hover{color:var(--cyan);}
.status-pill{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:500;letter-spacing:0.08em;color:var(--text2);background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);transition:background 0.4s,box-shadow 0.4s;}
.status-dot.online{background:var(--green);box-shadow:0 0 8px var(--green);}
.status-dot.connecting{background:var(--amber);box-shadow:0 0 8px var(--amber);animation:pulse-dot 1s infinite;}

main{flex:1;display:grid;grid-template-columns:1fr 320px;overflow:hidden;position:relative;z-index:1;}

.radar-area{position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.radar-rings{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}
.ring{position:absolute;border-radius:50%;border:1px solid var(--border);top:50%;left:50%;transform:translate(-50%,-50%);}
.ring-1{width:140px;height:140px;}
.ring-2{width:280px;height:280px;border-color:rgba(0,220,255,0.07);}
.ring-3{width:440px;height:440px;border-color:rgba(0,220,255,0.04);}
.radar-sweep{position:absolute;top:50%;left:50%;width:220px;height:220px;margin:-110px 0 0 -110px;border-radius:50%;background:conic-gradient(from 0deg,transparent 300deg,rgba(0,220,255,0.18) 360deg);animation:sweep 4s linear infinite;pointer-events:none;}
@keyframes sweep{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.radar-pulse{position:absolute;top:50%;left:50%;width:440px;height:440px;margin:-220px 0 0 -220px;border-radius:50%;border:1.5px solid var(--cyan);opacity:0;animation:pulse-out 3s ease-out infinite;pointer-events:none;}
@keyframes pulse-out{0%{transform:scale(0.3);opacity:0.5;}100%{transform:scale(1);opacity:0;}}

.you-node{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;}
.avatar{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:default;}
.avatar-ring{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;}
.you-avatar-ring{background:linear-gradient(135deg,rgba(0,220,255,0.2),rgba(123,92,245,0.2));border:2px solid var(--cyan);box-shadow:0 0 20px rgba(0,220,255,0.4),inset 0 0 15px rgba(0,220,255,0.1);}
.avatar-name{font-size:11px;font-weight:700;letter-spacing:0.07em;color:var(--text);white-space:nowrap;text-shadow:0 0 12px rgba(0,220,255,0.5);}
.avatar-sub{font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:-3px;white-space:nowrap;}

.peer-node{position:absolute;transform:translate(-50%,-50%);z-index:4;cursor:pointer;animation:node-in 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;}
@keyframes node-in{from{opacity:0;transform:translate(-50%,-50%) scale(0.5);}to{opacity:1;transform:translate(-50%,-50%) scale(1);}}
.peer-node .avatar-ring{background:linear-gradient(135deg,rgba(0,180,220,0.1),rgba(123,92,245,0.1));border:1.5px solid rgba(0,220,255,0.45);box-shadow:0 0 12px rgba(0,220,255,0.15);transition:all 0.25s;}
.peer-node:hover .avatar-ring{border-color:var(--cyan);box-shadow:var(--glow);transform:scale(1.1);}
.peer-node .avatar-name{color:var(--text2);}
.os-icon{display:flex;align-items:center;justify-content:center;color:var(--cyan);}

.sidebar{border-left:1px solid var(--border);background:rgba(8,12,24,0.75);backdrop-filter:blur(20px);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-section{padding:16px 20px;border-bottom:1px solid var(--border);}
.section-title{font-size:10px;font-weight:700;letter-spacing:0.14em;color:var(--text3);text-transform:uppercase;margin-bottom:10px;}
.status-msg{font-size:12px;color:var(--text3);padding:12px 20px;font-family:var(--mono);border-bottom:1px solid var(--border);min-height:40px;letter-spacing:0.03em;}
.peers-list{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bg3) transparent;}
.peer-item{display:flex;align-items:center;gap:12px;padding:11px 20px;border-bottom:1px solid rgba(0,220,255,0.05);cursor:pointer;transition:background 0.2s;}
.peer-item:hover{background:rgba(0,220,255,0.04);}
.peer-item-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,rgba(0,180,220,0.12),rgba(123,92,245,0.12));border:1.5px solid rgba(0,220,255,0.3);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text2);}
.peer-item-info{flex:1;min-width:0;}
.peer-item-name{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.peer-item-sub{font-family:var(--mono);font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.peer-item-action{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-family:var(--font);font-size:11px;font-weight:700;color:var(--cyan);cursor:pointer;transition:all 0.2s;flex-shrink:0;}
.peer-item-action:hover{background:rgba(0,220,255,0.08);border-color:var(--cyan);}
.activity-log{height:150px;overflow-y:auto;padding:10px 20px;scrollbar-width:thin;scrollbar-color:var(--bg3) transparent;}
.log-entry{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px;animation:log-in 0.3s ease;}
@keyframes log-in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.log-dot{width:6px;height:6px;border-radius:50%;margin-top:4px;flex-shrink:0;}
.log-dot.info{background:var(--cyan);}.log-dot.success{background:var(--green);}.log-dot.error{background:var(--red);}.log-dot.warn{background:var(--amber);}
.log-text{font-size:11px;color:var(--text2);line-height:1.5;flex:1;}
.log-time{font-family:var(--mono);font-size:10px;color:var(--text3);flex-shrink:0;margin-top:1px;}
.device-bar{padding:11px 20px;display:flex;gap:14px;border-top:1px solid var(--border);background:rgba(4,6,13,0.6);flex-shrink:0;}
.device-stat{display:flex;flex-direction:column;gap:2px;}
.device-stat-label{font-size:9px;font-weight:700;letter-spacing:0.12em;color:var(--text3);text-transform:uppercase;}
.device-stat-value{font-family:var(--mono);font-size:11px;color:var(--cyan);}
.empty-peers{padding:24px 20px;text-align:center;}
.empty-peers svg{color:var(--text3);margin-bottom:8px;}
.empty-peers p{font-size:12px;color:var(--text3);line-height:1.6;}

.modal-overlay{position:fixed;inset:0;background:rgba(4,6,13,0.88);backdrop-filter:blur(14px);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.modal-overlay.visible{opacity:1;pointer-events:all;}
.modal-box{background:var(--bg1);border:1px solid var(--border2);border-radius:var(--r2);padding:30px;width:390px;box-shadow:0 0 60px rgba(0,220,255,0.1),0 40px 80px rgba(0,0,0,0.6);transform:scale(0.94) translateY(12px);transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);}
.modal-overlay.visible .modal-box{transform:scale(1) translateY(0);}
.modal-peer-header{display:flex;align-items:center;gap:12px;margin-bottom:22px;}
.modal-peer-avatar{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,rgba(0,180,220,0.2),rgba(123,92,245,0.2));border:1.5px solid var(--cyan);display:flex;align-items:center;justify-content:center;box-shadow:0 0 18px rgba(0,220,255,0.28);color:var(--cyan);flex-shrink:0;}
.modal-peer-name{font-size:17px;font-weight:800;color:#fff;}
.modal-peer-sub{font-family:var(--mono);font-size:10px;color:var(--text2);margin-top:2px;}
.modal-hint{font-size:12px;color:var(--text2);margin-bottom:14px;letter-spacing:0.03em;}
.file-pick-label{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px dashed var(--border2);border-radius:var(--r);padding:15px;cursor:pointer;transition:border-color 0.2s,background 0.2s;margin-bottom:18px;}
.file-pick-label:hover{border-color:var(--cyan);background:rgba(0,220,255,0.04);}
.file-pick-label svg{color:var(--cyan);flex-shrink:0;}
.file-pick-label span{font-size:13px;color:var(--text2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.file-meta{display:flex;gap:16px;margin:-6px 0 16px;}
.file-meta-item{display:flex;flex-direction:column;gap:2px;}
.file-meta-label{font-size:9px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;font-weight:700;}
.file-meta-value{font-family:var(--mono);font-size:11px;color:var(--text);}
.modal-actions{display:flex;gap:10px;}
.btn-primary{flex:1;background:linear-gradient(135deg,var(--cyan),var(--cyan2));border:none;border-radius:8px;padding:12px;font-family:var(--font);font-size:13px;font-weight:700;color:#000;cursor:pointer;transition:opacity 0.2s,transform 0.1s;}
.btn-primary:disabled{opacity:0.35;cursor:not-allowed;}
.btn-primary:not(:disabled):hover{opacity:0.85;transform:translateY(-1px);}
.btn-cancel{flex:1;background:none;border:1px solid rgba(255,69,96,0.45);border-radius:8px;padding:12px;font-family:var(--font);font-size:13px;font-weight:700;color:var(--red);cursor:pointer;transition:all 0.2s;}
.btn-cancel:hover{background:rgba(255,69,96,0.09);border-color:var(--red);}
.btn-ghost{flex:1;background:none;border:1px solid var(--border2);border-radius:8px;padding:12px;font-family:var(--font);font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;transition:all 0.2s;}
.btn-ghost:hover{border-color:var(--text2);color:var(--text);}
.progress-wrap{margin-top:16px;}
.progress-wrap.hidden{display:none;}
.progress-track{height:5px;border-radius:3px;background:var(--bg3);overflow:hidden;margin-bottom:8px;}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--violet),var(--cyan));transition:width 0.15s;box-shadow:0 0 8px var(--cyan);width:0%;}
.progress-info{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--text2);}

.receive-toast{position:fixed;bottom:28px;right:28px;z-index:200;transform:translateY(130%);transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);}
.receive-toast.visible{transform:translateY(0);}
.toast-inner{background:var(--bg1);border:1px solid var(--border2);border-radius:var(--r2);padding:20px 24px;width:330px;box-shadow:0 0 40px rgba(0,220,255,0.12),0 24px 48px rgba(0,0,0,0.5);}
.toast-from{font-size:10px;font-weight:700;letter-spacing:0.14em;color:var(--cyan);text-transform:uppercase;margin-bottom:4px;}
.toast-title{font-size:15px;font-weight:800;color:#fff;margin-bottom:2px;}
.toast-file{font-family:var(--mono);font-size:12px;color:var(--text2);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.toast-size{font-family:var(--mono);font-size:11px;color:var(--text3);margin-bottom:14px;}
.toast-progress{margin-bottom:12px;}
.toast-progress .progress-track{height:4px;}
.toast-actions{display:flex;gap:8px;}
.toast-actions .btn-primary,.toast-actions .btn-ghost,.toast-actions .btn-cancel{padding:10px;font-size:12px;}
.recv-progress-wrap{margin-bottom:12px;}
.recv-progress-wrap.hidden{display:none;}

.notif-stack{position:fixed;top:70px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.notif{background:var(--bg1);border:1px solid var(--border);border-radius:10px;padding:11px 16px;font-size:12px;color:var(--text);box-shadow:0 8px 24px rgba(0,0,0,0.4);animation:notif-in 0.3s ease;pointer-events:none;display:flex;align-items:center;gap:8px;max-width:260px;}
.notif.success{border-color:rgba(0,255,179,0.3);}.notif.error{border-color:rgba(255,69,96,0.3);}.notif.warn{border-color:rgba(255,184,48,0.3);}
@keyframes notif-in{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
@keyframes notif-out{to{opacity:0;transform:translateX(20px)}}
.notif.out{animation:notif-out 0.25s ease forwards;}

.radar-area.drag-over::after{content:'Drop to send';position:absolute;inset:0;background:rgba(0,220,255,0.06);border:2px dashed var(--cyan);border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:var(--cyan);z-index:20;letter-spacing:0.1em;}

::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px;}

@media(max-width:640px){
  main{grid-template-columns:1fr;grid-template-rows:1fr auto;}
  .sidebar{border-left:none;border-top:1px solid var(--border);max-height:260px;}
  .activity-log{display:none;}
  .ring-3{width:300px;height:300px;}
  .radar-pulse{width:300px;height:300px;margin:-150px 0 0 -150px;}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <circle cx="5" cy="12" r="3" fill="currentColor" opacity="0.9"/>
        <circle cx="19" cy="12" r="3" fill="currentColor" opacity="0.9"/>
        <path d="M8 12h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M8 9l-3 3 3 3M16 9l3 3-3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
      </svg>
    </div>
    <span class="logo-text">IMShare</span>
    <div class="logo-dot"></div>
  </div>
  <div class="header-right">
    <div class="my-id-wrap">
      <span class="my-id-label">NODE</span>
      <code id="my-peer-id">initializing…</code>
      <button class="copy-btn" id="copy-id-btn" title="Copy ID">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      </button>
    </div>
    <div class="status-pill">
      <div class="status-dot connecting" id="status-dot"></div>
      <span id="status-label">Connecting</span>
    </div>
  </div>
</header>

<main>
  <div class="radar-area" id="radar-area">
    <div class="radar-rings">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
    </div>
    <div class="radar-sweep"></div>
    <div class="radar-pulse"></div>
    <div class="you-node" id="you-node">
      <div class="avatar">
        <div class="avatar-ring you-avatar-ring" id="you-avatar-ring"></div>
        <span class="avatar-name" id="you-name">You</span>
        <span class="avatar-sub" id="you-sub">—</span>
      </div>
    </div>
    <div id="peers-radar"></div>
  </div>

  <div class="sidebar">
    <div class="status-msg" id="status-msg">Scanning for peers…</div>
    <div class="sidebar-section" style="flex:1;overflow:hidden;display:flex;flex-direction:column;padding-bottom:0;">
      <div class="section-title">Peers <span id="peer-count" style="color:var(--cyan)">0</span></div>
      <div class="peers-list" id="peers-list">
        <div class="empty-peers" id="empty-peers">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8" stroke-linecap="round"/></svg>
          <p>No peers on this network.<br/>Share your Node ID to connect.</p>
        </div>
      </div>
    </div>
    <div class="sidebar-section" style="padding:12px 0 0;border-bottom:none;">
      <div class="section-title" style="padding:0 20px;">Activity</div>
      <div class="activity-log" id="activity-log"></div>
    </div>
    <div class="device-bar">
      <div class="device-stat"><span class="device-stat-label">OS</span><span class="device-stat-value" id="stat-os">—</span></div>
      <div class="device-stat"><span class="device-stat-label">Browser</span><span class="device-stat-value" id="stat-browser">—</span></div>
      <div class="device-stat"><span class="device-stat-label">Transfers</span><span class="device-stat-value" id="stat-transfers">0</span></div>
      <div class="device-stat"><span class="device-stat-label">Sent</span><span class="device-stat-value" id="stat-data">0 B</span></div>
    </div>
  </div>
</main>

<!-- SEND MODAL -->
<div class="modal-overlay" id="send-modal">
  <div class="modal-box">
    <div class="modal-peer-header">
      <div class="modal-peer-avatar" id="modal-peer-avatar"></div>
      <div>
        <div class="modal-peer-name" id="modal-peer-name">Peer</div>
        <div class="modal-peer-sub" id="modal-peer-sub">—</div>
      </div>
    </div>
    <p class="modal-hint">Select a file to transfer via P2P channel</p>
    <label class="file-pick-label">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <span id="file-name-display">Browse or drag a file…</span>
      <input type="file" id="file-input" style="display:none"/>
    </label>
    <div class="file-meta" id="file-meta" style="display:none">
      <div class="file-meta-item"><span class="file-meta-label">Size</span><span class="file-meta-value" id="meta-size">—</span></div>
      <div class="file-meta-item"><span class="file-meta-label">Type</span><span class="file-meta-value" id="meta-type">—</span></div>
    </div>
    <!-- pre-send actions -->
    <div class="modal-actions" id="modal-pre-actions">
      <button id="send-btn" class="btn-primary" disabled>Send File</button>
      <button id="cancel-btn" class="btn-ghost">Cancel</button>
    </div>

<script type="module">
/* ═══════════════════════════════════
   PERSISTENT IDENTITY  (localStorage)
   Each device keeps the same name & id across reloads.
═══════════════════════════════════ */
const NAME_ADJ  = ['Neon','Void','Flux','Zeta','Nova','Axon','Crux','Echo','Helix','Vortex','Onyx','Prism','Quark','Sigma','Titan','Lyra','Cobalt','Nexus','Photon','Cipher','Relic','Pulse','Drift','Apex','Ghost','Glitch','Storm','Mirage','Zenith','Pixel']
const NAME_NOUN = ['Raven','Specter','Vector','Aether','Pylon','Drake','Cipher','Lynx','Wraith','Halo','Comet','Nomad','Relay','Shard','Mantle','Surge','Fable','Orbit','Warden','Blaze','Sable','Proxy','Nexus','Tempest','Signal','Ember','Cascade','Phantom','Vertex','Strider']

function genCatchyName() {
  return NAME_ADJ[Math.floor(Math.random()*NAME_ADJ.length)] + ' ' + NAME_NOUN[Math.floor(Math.random()*NAME_NOUN.length)]
}

// Deterministic display name from any peerId (used for remote peers whose name we don't have yet)
function fallbackLabel(peerId) {
  let h = 0
  for (let i = 0; i < peerId.length; i++) h = (h * 31 + peerId.charCodeAt(i)) >>> 0
  return NAME_ADJ[h % NAME_ADJ.length] + ' ' + NAME_NOUN[(h >> 4) % NAME_NOUN.length]
}

// Persistent peer-id and display name for THIS device
function getMyIdentity() {
  let id   = localStorage.getItem('imshare_peer_id')
  let name = localStorage.getItem('imshare_peer_name')
  if (!id) {
    // generate stable id from random segments
    const seg = () => Math.random().toString(36).slice(2, 7)
    id = seg() + '-' + seg() + '-' + seg()
    localStorage.setItem('imshare_peer_id', id)
  }
  if (!name) {
    name = genCatchyName()
    localStorage.setItem('imshare_peer_name', name)
  }
  return { id, name }
}

const myIdentity = getMyIdentity()   // { id, name }  — stable across reloads

/* ═══════════════════════════════════
   OS DETECTION
═══════════════════════════════════ */
function detectOS() {
  const ua = navigator.userAgent
  let os = 'unknown', browser = 'Unknown'
  if (/Windows/.test(ua))                      os = 'windows'
  else if (/Mac OS X/.test(ua) && !/iPhone|iPad/.test(ua)) os = 'macos'
  else if (/iPhone/.test(ua))                  os = 'ios'
  else if (/iPad/.test(ua))                    os = 'ios'
  else if (/Android/.test(ua))                 os = 'android'
  else if (/Linux/.test(ua))                   os = 'linux'
  else if (/CrOS/.test(ua))                    os = 'chrome'
  if      (/Edg\//.test(ua))                   browser = 'Edge'
  else if (/Chrome\//.test(ua))                browser = 'Chrome'
  else if (/Firefox\//.test(ua))               browser = 'Firefox'
  else if (/Safari\//.test(ua))                browser = 'Safari'
  else if (/Opera|OPR/.test(ua))               browser = 'Opera'
  return { os, browser }
}

function getOsIcon(os){ return OS_ICONS[os] || OS_ICONS.unknown }

const devInfo = detectOS()

/* ═══════════════════════════════════
   PEER ENGINE  (native WebRTC + signaling)
   Uses the persistent myIdentity.id as the peer ID
   so the same device always has the same node ID.
═══════════════════════════════════ */
const CHUNK_SIZE  = 64 * 1024
const DEFAULT_ROOM = 'imshare-default-room'
const SIGNAL_URL   = 'wss://filedrop-signaling.abdullah21673.workers.dev/signal'

function getRoomId(){ return window.location.hash.replace('#','').trim() || DEFAULT_ROOM }

const RTC_CONFIG = { iceServers:[{ urls:'stun:stun.l.google.com:19302' }] }

class IMSharePeer {
  constructor(cb) {
    Object.assign(this, cb)
    this.myId           = myIdentity.id
    this.ws             = null
    this.peerConns      = new Map()   // peerId → {pc, iceCandidateQueue, remoteDescSet}
    this.dataChannels   = new Map()   // peerId → RTCDataChannel
    this.pendingReceive = null        // {peerId, meta, resolve, reject} or null
    this._recvBuffers   = new Map()   // peerId → {chunks, meta, accepted, done}
    this._sendAbort     = false
    this._connect()
  }

  /* ── signaling ── */
  _connect() {
    const url = `${SIGNAL_URL}?peerId=${this.myId}&room=${getRoomId()}`
    this.ws = new WebSocket(url)
    this.ws.onopen    = () => this.onReady(this.myId)
    this.ws.onmessage = async (e) => {
      const msg = JSON.parse(e.data)
      if (msg.type==='PEER_LIST') for (const id of msg.peers) await this._createOffer(id)
      if (msg.type==='PEER_LEFT') this._removePeer(msg.peerId)
      if (msg.type==='offer')     await this._handleOffer(msg.from, msg.sdp)
      if (msg.type==='answer')    await this._handleAnswer(msg.from, msg.sdp)
      if (msg.type==='ice')       await this._handleIce(msg.from, msg.candidate)
    }
    this.ws.onclose = () => setTimeout(()=>this._connect(), 2000)
    this.ws.onerror = () => this.onError('Signaling failed')
  }
  _signal(to, msg){ if(this.ws.readyState===WebSocket.OPEN) this.ws.send(JSON.stringify({...msg,to})) }

  /* ── RTCPeerConnection ── */
  _createPC(peerId) {
    if (this.peerConns.has(peerId)) return this.peerConns.get(peerId)
    const pc    = new RTCPeerConnection(RTC_CONFIG)
    const entry = { pc, iceCandidateQueue:[], remoteDescSet:false }
    this.peerConns.set(peerId, entry)
    pc.onicecandidate = (e)=>{ if(e.candidate) this._signal(peerId,{type:'ice',candidate:e.candidate}) }
    pc.onconnectionstatechange = () => {
      if (pc.connectionState==='connected')                    this._onConnected(peerId)
      if (['failed','disconnected'].includes(pc.connectionState)) this._removePeer(peerId)
    }
    return entry
  }
  async _createOffer(peerId) {
    const {pc} = this._createPC(peerId)
    const dc   = pc.createDataChannel('imshare',{ordered:true})
    this._bindDC(dc, peerId)
    this.dataChannels.set(peerId, dc)
    await pc.setLocalDescription(await pc.createOffer())
    this._signal(peerId,{type:'offer',sdp:pc.localDescription.sdp})
  }
  async _handleOffer(peerId, sdp) {
    const entry = this._createPC(peerId)
    entry.pc.ondatachannel = (e)=>{ this.dataChannels.set(peerId,e.channel); this._bindDC(e.channel,peerId) }
    await entry.pc.setRemoteDescription({type:'offer',sdp})
    entry.remoteDescSet = true
    for (const c of entry.iceCandidateQueue) try{await entry.pc.addIceCandidate(c)}catch(_){}
    entry.iceCandidateQueue = []
    await entry.pc.setLocalDescription(await entry.pc.createAnswer())
    this._signal(peerId,{type:'answer',sdp:entry.pc.localDescription.sdp})
  }
  async _handleAnswer(peerId, sdp) {
    const entry = this.peerConns.get(peerId); if(!entry) return
    await entry.pc.setRemoteDescription({type:'answer',sdp})
    entry.remoteDescSet = true
    for (const c of entry.iceCandidateQueue) try{await entry.pc.addIceCandidate(c)}catch(_){}
    entry.iceCandidateQueue = []
  }
  async _handleIce(peerId, candidate) {
    if (!candidate) return
    const entry = this.peerConns.get(peerId); if(!entry) return
    if (!entry.remoteDescSet) entry.iceCandidateQueue.push(candidate)
    else try{await entry.pc.addIceCandidate(candidate)}catch(_){}
  }

  /* ── data channel ── */
  _bindDC(dc, peerId) {
    dc.binaryType = 'arraybuffer'
    dc.onopen  = () => {
      // send HELLO immediately on open so the remote side gets our name + OS
      dc.send(JSON.stringify({
        type:'HELLO',
        name: myIdentity.name,
        os:   devInfo.os,
        browser: devInfo.browser
      }))
    }
    dc.onmessage = (e) => this._onMsg(peerId, e.data)
  }

  // called when WebRTC reaches 'connected' state
  _onConnected(peerId) {
    // onPeerJoin is deferred until we receive the HELLO from that peer
    // so we have their name/OS before rendering them
  }

  /* ── incoming messages ── */
  _onMsg(peerId, data) {
    if (typeof data === 'string') {
      const msg = JSON.parse(data)

      // ── HELLO  ─────────────────────────────────────────
      if (msg.type === 'HELLO') {
        this.onPeerHello(peerId, msg)   // gives name+os to UI, then renders node
        return
      }

      // ── FILE_OFFER ─────────────────────────────────────
      if (msg.type === 'FILE_OFFER') {
        this._recvBuffers.set(peerId, {chunks:[],meta:msg,accepted:false,done:false})
        this.pendingReceive = {
          peerId, meta: msg,
          resolve: () => {
            const s = this._recvBuffers.get(peerId)
            if (s) s.accepted = true
            this.pendingReceive = null
            // signal sender we accepted so they start sending chunks
            const dc = this.dataChannels.get(peerId)
            if (dc && dc.readyState==='open') dc.send(JSON.stringify({type:'FILE_ACCEPTED'}))
          },
          reject: () => { this._recvBuffers.delete(peerId); this.pendingReceive = null }
        }
        this.onFileOffer(peerId, msg)
        return
      }

      // ── FILE_ACCEPTED ──────────────────────────────────
      // Sender now knows receiver accepted — start streaming chunks
      if (msg.type === 'FILE_ACCEPTED') {
        this.onFileAccepted && this.onFileAccepted(peerId)
        return
      }

      // ── FILE_DONE ──────────────────────────────────────
      if (msg.type === 'FILE_DONE') {
        const state = this._recvBuffers.get(peerId); if(!state) return
        state.done = true
        if (state.accepted) this._triggerDownload(peerId)
        return
      }

      // ── FILE_ABORT (either side) ───────────────────────
      if (msg.type === 'FILE_ABORT') {
        this._recvBuffers.delete(peerId)
        if (this.pendingReceive && this.pendingReceive.peerId===peerId) this.pendingReceive=null
        this.onTransferAborted && this.onTransferAborted(peerId)
        return
      }

      // ── FILE_DECLINED ──────────────────────────────────
      if (msg.type === 'FILE_DECLINED') {
        this.onFileDeclined && this.onFileDeclined(peerId)
        return
      }

    } else {
      // binary chunk
      const state = this._recvBuffers.get(peerId); if(!state || !state.accepted) return
      state.chunks.push(data)
      const received = state.chunks.reduce((a,c)=>a+c.byteLength, 0)
      this.onProgress(peerId, Math.round((received/state.meta.size)*100), 'receive', state.meta.size, received)
    }
  }

  /* ── send flow ── */
  // sendFile now only sends the FILE_OFFER and waits for FILE_ACCEPTED
  // actual chunk streaming is kicked off by onFileAccepted
  sendFile(peerId, file) {
    const dc = this.dataChannels.get(peerId)
    if (!dc || dc.readyState!=='open') throw new Error('Not connected')
    this._sendAbort = false
    this._pendingSendFile = file
    this._pendingSendPeer = peerId
    dc.send(JSON.stringify({type:'FILE_OFFER', name:file.name, size:file.size, mime:file.type}))
    // actual streaming starts when FILE_ACCEPTED arrives
  }

  _startStreaming(peerId) {
    const file = this._pendingSendFile
    const dc   = this.dataChannels.get(peerId)
    if (!file || !dc) return
    let offset = 0
    const reader = new FileReader()
    const readNext = () => {
      if (this._sendAbort) {
        dc.send(JSON.stringify({type:'FILE_ABORT'}))
        this.onSendAborted && this.onSendAborted()
        return
      }
      if (offset >= file.size) return
      reader.readAsArrayBuffer(file.slice(offset, offset+CHUNK_SIZE))
    }
    reader.onload = (e) => {
      if (this._sendAbort) {
        dc.send(JSON.stringify({type:'FILE_ABORT'}))
        this.onSendAborted && this.onSendAborted()
        return
      }
      dc.send(e.target.result)
      offset += e.target.result.byteLength
      const pct = Math.min(99, Math.round((offset/file.size)*100))
      this.onProgress(peerId, pct, 'send', file.size, offset)
      if (offset < file.size) {
        dc.bufferedAmount > 1024*1024 ? setTimeout(readNext,50) : readNext()
      } else {
        dc.send(JSON.stringify({type:'FILE_DONE'}))
        this.onProgress(peerId, 100, 'send', file.size, file.size)
        this.onSendDone && this.onSendDone(peerId, file)
      }
    }
    readNext()
  }

  cancelSend() {
    this._sendAbort = true
    // if FILE_OFFER was sent but no FILE_ACCEPTED yet, inform receiver
    const peerId = this._pendingSendPeer
    if (peerId) {
      const dc = this.dataChannels.get(peerId)
      if (dc && dc.readyState==='open') dc.send(JSON.stringify({type:'FILE_ABORT'}))
    }
  }

  cancelReceive() {
    if (this.pendingReceive) {
      const dc = this.dataChannels.get(this.pendingReceive.peerId)
      if (dc && dc.readyState==='open') dc.send(JSON.stringify({type:'FILE_ABORT'}))
      this._recvBuffers.delete(this.pendingReceive.peerId)
      this.pendingReceive = null
    }
    this.onReceiveCancelled && this.onReceiveCancelled()
  }

  declineFile() {
    if (this.pendingReceive) {
      const dc = this.dataChannels.get(this.pendingReceive.peerId)
      if (dc && dc.readyState==='open') dc.send(JSON.stringify({type:'FILE_DECLINED'}))
      this.pendingReceive.reject()
    }
  }

  _triggerDownload(peerId) {
    const state = this._recvBuffers.get(peerId); if(!state) return
    const blob = new Blob(state.chunks, {type: state.meta.mime||'application/octet-stream'})
    const url  = URL.createObjectURL(blob)
    const a = document.createElement('a'); a.href=url; a.download=state.meta.name; a.click()
    setTimeout(()=>URL.revokeObjectURL(url), 5000)
    this._recvBuffers.delete(peerId)
    this.onReceiveDone && this.onReceiveDone(peerId, state.meta)
  }

  _removePeer(peerId) {
    const entry = this.peerConns.get(peerId)
    if (entry) entry.pc.close()
    this.peerConns.delete(peerId)
    this.dataChannels.delete(peerId)
    this._recvBuffers.delete(peerId)
    this.onPeerLeave(peerId)
  }
}

/* ═══════════════════════════════════
   UI STATE
═══════════════════════════════════ */
const peerInfo  = new Map()   // peerId → {name, os, browser}
let activePeerId   = null
let currentFile    = null
let sendStartTime  = null
let statsTransfers = 0, statsDataBytes = 0

const POSITIONS = [
  {x:50,y:18},{x:79,y:40},{x:72,y:76},{x:28,y:76},{x:21,y:40},
  {x:50,y:8},{x:86,y:27},{x:88,y:64},{x:62,y:90},{x:38,y:90},{x:12,y:64},{x:14,y:27}
]
let peerSlot = 0

function fmt(b){
  if(b<1024) return b+' B'
  if(b<1048576) return (b/1024).toFixed(1)+' KB'
  return (b/1048576).toFixed(2)+' MB'
}

/* ── notifications ── */
function notify(msg, type='info') {
  const s = document.getElementById('notif-stack')
  const el = document.createElement('div')
  el.className = 'notif '+type
  const color = {success:'var(--green)',error:'var(--red)',warn:'var(--amber)'}[type]||'var(--cyan)'
  const icon  = {success:'✓',error:'✗',warn:'⚠'}[type]||'→'
  el.innerHTML = `<span style="color:${color}">${icon}</span> ${msg}`
  s.appendChild(el)
  setTimeout(()=>{ el.classList.add('out'); setTimeout(()=>el.remove(),300) }, 3500)
}
function addLog(msg, type='info') {
  const logEl = document.getElementById('activity-log')
  const t  = new Date()
  const ts = [t.getHours(),t.getMinutes(),t.getSeconds()].map(n=>String(n).padStart(2,'0')).join(':')
  const el = document.createElement('div')
  el.className = 'log-entry'
  el.innerHTML = `<div class="log-dot ${type}"></div><span class="log-text">${msg}</span><span class="log-time">${ts}</span>`
  logEl.appendChild(el)
  logEl.scrollTop = logEl.scrollHeight
}
function setStatus(t){ document.getElementById('status-msg').textContent = t }

/* ── radar ── */
function addPeerNode(peerId, info) {
  peerInfo.set(peerId, info)
  const pos = POSITIONS[peerSlot % POSITIONS.length]; peerSlot++
  const node = document.createElement('div')
  node.className = 'peer-node'; node.id = 'rnode-'+peerId
  node.style.left = pos.x+'%'; node.style.top = pos.y+'%'
  node.innerHTML = `
    <div class="avatar">
      <div class="avatar-ring" style="background:linear-gradient(135deg,rgba(0,180,220,0.1),rgba(123,92,245,0.1));border:1.5px solid rgba(0,220,255,0.45);box-shadow:0 0 12px rgba(0,220,255,0.15);">
        <div class="os-icon">${getOsIcon(info.os)}</div>
      </div>
      <span class="avatar-name">${info.name}</span>
    </div>`
  node.addEventListener('click', ()=>openSendModal(peerId))
  document.getElementById('peers-radar').appendChild(node)
  updateSidebar()
  setStatus(`${peerInfo.size} peer${peerInfo.size>1?'s':''} nearby — click to send`)
  addLog(`${info.name} connected (${info.os})`, 'success')
  notify(`${info.name} online`, 'success')
}

function removePeerNode(peerId) {
  const node = document.getElementById('rnode-'+peerId)
  if (node){ node.style.opacity='0'; node.style.transition='opacity 0.3s'; setTimeout(()=>node.remove(),300) }
  const info = peerInfo.get(peerId)
  const name = info ? info.name : fallbackLabel(peerId)
  peerInfo.delete(peerId)
  updateSidebar()
  setStatus(peerInfo.size===0 ? 'Scanning for peers…' : `${peerInfo.size} peer${peerInfo.size>1?'s':''} nearby`)
  addLog(`${name} left`, 'warn')
  notify(`${name} disconnected`, 'warn')
}

function updateSidebar() {
  const list  = document.getElementById('peers-list')
  const empty = document.getElementById('empty-peers')
  const count = peerInfo.size
  document.getElementById('peer-count').textContent = count
  list.querySelectorAll('.peer-item').forEach(el=>el.remove())
  if (count===0){ empty.style.display=''; return }
  empty.style.display = 'none'
  peerInfo.forEach((info, id)=>{
    const el = document.createElement('div'); el.className='peer-item'
    el.innerHTML = `
      <div class="peer-item-avatar">${getOsIcon(info.os)}</div>
      <div class="peer-item-info">
        <div class="peer-item-name">${info.name}</div>
        <div class="peer-item-sub">${info.os} · ${info.browser}</div>
      </div>
      <button class="peer-item-action">Send</button>`
    el.querySelector('button').addEventListener('click',e=>{e.stopPropagation();openSendModal(id)})
    list.appendChild(el)
  })
}

/* ── send modal ── */
function openSendModal(peerId) {
  activePeerId = peerId; currentFile = null
  const info = peerInfo.get(peerId) || {name:fallbackLabel(peerId), os:'unknown', browser:'—'}
  document.getElementById('modal-peer-name').textContent = info.name
  document.getElementById('modal-peer-sub').textContent  = `${info.os} · ${info.browser}`
  document.getElementById('modal-peer-avatar').innerHTML = getOsIcon(info.os)
  document.getElementById('file-name-display').textContent = 'Browse or drag a file…'
  document.getElementById('send-btn').disabled = true
  document.getElementById('progress-wrap').classList.add('hidden')
  document.getElementById('progress-fill').style.width = '0%'
  document.getElementById('progress-label').textContent = '0%'
  document.getElementById('progress-speed').textContent = '—'
  document.getElementById('file-meta').style.display = 'none'
  document.getElementById('file-input').value = ''
  document.getElementById('modal-pre-actions').style.display = 'flex'
  document.getElementById('modal-sending-actions').style.display = 'none'
  document.getElementById('send-modal').classList.add('visible')
}

function closeSendModal() {
  document.getElementById('send-modal').classList.remove('visible')
  activePeerId = null; currentFile = null; sendStartTime = null
  // reset to pre-send state
  document.getElementById('modal-pre-actions').style.display = 'flex'
  document.getElementById('modal-sending-actions').style.display = 'none'
  document.getElementById('progress-wrap').classList.add('hidden')
}

function showSendProgress() {
  document.getElementById('modal-pre-actions').style.display = 'none'
  document.getElementById('modal-sending-actions').style.display = 'flex'
  document.getElementById('progress-wrap').classList.remove('hidden')
}

/* ── receive toast ── */
function showReceiveToast(peerId, meta) {
  const info = peerInfo.get(peerId) || {name:fallbackLabel(peerId)}
  document.getElementById('toast-from').textContent  = `From ${info.name}`
  document.getElementById('toast-title').textContent = meta.name
  document.getElementById('toast-file').textContent  = meta.name
  document.getElementById('toast-size').textContent  = fmt(meta.size)
  // reset to offer state
  document.getElementById('toast-pre-actions').style.display = 'flex'
  document.getElementById('recv-progress-wrap').classList.add('hidden')
  document.getElementById('toast-post-actions').style.display = 'none'
  document.getElementById('receive-toast').classList.add('visible')
  addLog(`Incoming: ${meta.name} (${fmt(meta.size)}) from ${info.name}`, 'info')
}
function hideReceiveToast(){ document.getElementById('receive-toast').classList.remove('visible') }
function showReceiveProgress() {
  document.getElementById('toast-pre-actions').style.display = 'none'
  document.getElementById('recv-progress-wrap').classList.remove('hidden')
  document.getElementById('toast-post-actions').style.display = 'flex'
}

/* ═══════════════════════════════════
   EVENT WIRING
═══════════════════════════════════ */
document.getElementById('file-input').addEventListener('change', e=>{
  const f = e.target.files[0]; if(!f) return
  currentFile = f
  document.getElementById('file-name-display').textContent = f.name
  document.getElementById('send-btn').disabled = false
  document.getElementById('file-meta').style.display = 'flex'
  document.getElementById('meta-size').textContent = fmt(f.size)
  document.getElementById('meta-type').textContent = f.type||'unknown'
})

document.getElementById('send-btn').addEventListener('click', ()=>{
  if (!currentFile || !activePeerId) return
  sendStartTime = Date.now()
  // Disable file pick + send button, show waiting state
  document.getElementById('send-btn').disabled = true
  document.getElementById('file-name-display').textContent = 'Waiting for peer to accept…'
  try {
    isp.sendFile(activePeerId, currentFile)
    // modal stays open; sending-actions appear once FILE_ACCEPTED arrives
  } catch(err) {
    notify('Send failed: '+err.message, 'error'); closeSendModal()
  }
})

document.getElementById('abort-send-btn').addEventListener('click', ()=>{
  isp.cancelSend()
  closeSendModal()
  notify('Transfer cancelled', 'warn')
})

document.getElementById('cancel-btn').addEventListener('click', ()=>{
  // If FILE_OFFER was already sent, we need to abort on the remote side too
  isp.cancelSend()
  closeSendModal()
})

document.getElementById('send-modal').addEventListener('click', e=>{
  if (e.target===document.getElementById('send-modal')){
    isp.cancelSend()
    closeSendModal()
  }
})

document.getElementById('accept-btn').addEventListener('click', ()=>{
  if (!isp.pendingReceive) return
  isp.pendingReceive.resolve()   // sends FILE_ACCEPTED to sender
  showReceiveProgress()
})

document.getElementById('decline-btn').addEventListener('click', ()=>{
  isp.declineFile(); hideReceiveToast()
})

document.getElementById('recv-cancel-btn').addEventListener('click', ()=>{
  isp.cancelReceive()
  hideReceiveToast()
  notify('Transfer cancelled', 'warn')
})

document.getElementById('copy-id-btn').addEventListener('click', ()=>{
  navigator.clipboard.writeText(myIdentity.id).then(()=>notify('Node ID copied!','success'))
})

const radarArea = document.getElementById('radar-area')
radarArea.addEventListener('dragover',  e=>{ e.preventDefault(); radarArea.classList.add('drag-over') })
radarArea.addEventListener('dragleave', ()=>radarArea.classList.remove('drag-over'))
radarArea.addEventListener('drop', e=>{
  e.preventDefault(); radarArea.classList.remove('drag-over')
  const f = e.dataTransfer.files[0]; if(!f) return
  const ids = [...peerInfo.keys()]
  if (ids.length===0){ notify('No peers online yet','warn'); return }
  if (ids.length===1){
    openSendModal(ids[0])
    currentFile = f
    document.getElementById('file-name-display').textContent = f.name
    document.getElementById('send-btn').disabled = false
    document.getElementById('file-meta').style.display = 'flex'
    document.getElementById('meta-size').textContent = fmt(f.size)
    document.getElementById('meta-type').textContent = f.type||'unknown'
  } else { notify('Drop onto a specific peer node','info') }
})

/* ═══════════════════════════════════
   BOOT
═══════════════════════════════════ */
// Set up "you" node with persistent name + OS icon
document.getElementById('you-avatar-ring').innerHTML =
  `<div class="os-icon" style="color:var(--cyan)">${getOsIcon(devInfo.os)}</div>`
document.getElementById('stat-os').textContent      = devInfo.os
document.getElementById('stat-browser').textContent = devInfo.browser

const isp = new IMSharePeer({
  onReady(id) {
    document.getElementById('my-peer-id').textContent   = id
    document.getElementById('status-dot').className     = 'status-dot online'
    document.getElementById('status-label').textContent = 'Online'
    // Show this device's persistent name on the "You" node
    document.getElementById('you-name').textContent     = myIdentity.name
    document.getElementById('you-sub').textContent      = devInfo.os+' · '+devInfo.browser
    setStatus('Scanning for peers…')
    addLog('IMShare node online', 'success')
    notify('Connected to network', 'success')
  },

  // Called when a peer's HELLO is received — we now have their name + OS
  onPeerHello(peerId, info) {
    addPeerNode(peerId, {
      name:    info.name    || fallbackLabel(peerId),
      os:      info.os      || 'unknown',
      browser: info.browser || '—'
    })
  },

  onPeerLeave(peerId) { removePeerNode(peerId) },

  onFileOffer(peerId, meta) { showReceiveToast(peerId, meta) },

  // Sender gets notified that receiver accepted → start streaming
  onFileAccepted(peerId) {
    showSendProgress()
    isp._startStreaming(peerId)
  },

  onProgress(peerId, pct, direction) {
    if (direction==='send') {
      document.getElementById('progress-fill').style.width   = pct+'%'
      document.getElementById('progress-label').textContent  = pct+'%'
      if (sendStartTime) {
        const elapsed = (Date.now()-sendStartTime)/1000
        const file = isp._pendingSendFile
        if (elapsed>0 && file) {
          const speed = (pct/100*file.size)/elapsed
          document.getElementById('progress-speed').textContent = fmt(speed)+'/s'
        }
      }
    }
    if (direction==='receive') {
      document.getElementById('recv-progress-fill').style.width  = pct+'%'
      document.getElementById('recv-progress-label').textContent = pct+'%'
    }
  },

  onSendDone(peerId, file) {
    statsTransfers++; statsDataBytes += file.size
    document.getElementById('stat-transfers').textContent = statsTransfers
    document.getElementById('stat-data').textContent      = fmt(statsDataBytes)
    const name = (peerInfo.get(peerId)||{}).name || 'peer'
    addLog(`✓ Sent ${file.name} to ${name}`, 'success')
    notify(`Sent ${file.name}`, 'success')
    setTimeout(closeSendModal, 900)
  },

  onSendAborted() {
    closeSendModal()
  },

  onReceiveDone(peerId, meta) {
    statsTransfers++; statsDataBytes += meta.size
    document.getElementById('stat-transfers').textContent = statsTransfers
    document.getElementById('stat-data').textContent      = fmt(statsDataBytes)
    addLog(`✓ Received ${meta.name} (${fmt(meta.size)})`, 'success')
    notify(`Downloaded ${meta.name}`, 'success')
    setTimeout(hideReceiveToast, 1500)
  },

  onReceiveCancelled() { hideReceiveToast() },

  // The OTHER side cancelled / aborted
  onTransferAborted(peerId) {
    const name = (peerInfo.get(peerId)||{}).name || 'Peer'
    addLog(`${name} cancelled transfer`, 'warn')
    notify('Transfer cancelled by peer', 'warn')
    hideReceiveToast()
    closeSendModal()
  },

  onFileDeclined(peerId) {
    const name = (peerInfo.get(peerId)||{}).name || 'Peer'
    notify(`${name} declined the file`, 'warn')
    closeSendModal()
  },

  onError(msg) {
    setStatus('Error: '+msg)
    document.getElementById('status-dot').className     = 'status-dot'
    document.getElementById('status-label').textContent = 'Error'
    addLog(msg, 'error')
  }
})

addLog('IMShare initialized', 'info')
addLog(`Identity: ${myIdentity.name} · ${devInfo.os}`, 'info')
</script>
</body>
</html>
